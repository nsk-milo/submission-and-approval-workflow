services:
  postgres:
    image: postgres:16-alpine
    container_name: pacra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pacra
      POSTGRES_PASSWORD: pacra
      POSTGRES_DB: pacra
    ports:
      - '5434:5432'
    volumes:
      - pacra-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pacra -d pacra']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: pacra-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: 'postgresql://pacra:pacra@postgres:5432/pacra?schema=public'
      JWT_SECRET: 'change-me-in-production'
      JWT_EXPIRES_IN: '1d'
      PORT: '4000'
      CORS_ORIGIN: 'http://localhost:3000'
    ports:
      - '4000:4000'

volumes:
  pacra-db:
